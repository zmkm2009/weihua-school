<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>生成占位图片</title>
</head>
<body>
    <h1>占位图片生成器</h1>
    <p>使用data URI创建简单的占位图片</p>
    <script>
        // 为华学校logo占位（橙色背景+白色文字）
        const logoPlaceholder = `data:image/svg+xml,${encodeURIComponent('<svg width="200" height="80" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#FF6B35" rx="8"/><text x="50%" y="50%" font-family="Microsoft YaHei" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">为华学校</text></svg>')}`;

        // 校园环境占位
        const campusPlaceholder = `data:image/svg+xml,${encodeURIComponent('<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#F5F5F5"/><text x="50%" y="45%" font-family="Microsoft YaHei" font-size="32" fill="#666" text-anchor="middle">校园环境</text><text x="50%" y="55%" font-family="Microsoft YaHei" font-size="16" fill="#999" text-anchor="middle">请上传实际照片</text></svg>')}`;

        // 教师照片占位
        const teacherPlaceholder = `data:image/svg+xml,${encodeURIComponent('<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#F5F5F5"/><circle cx="150" cy="100" r="50" fill="#E0E0E0"/><rect x="100" y="160" width="100" height="60" rx="30" fill="#E0E0E0"/><text x="50%" y="80%" font-family="Microsoft YaHei" font-size="14" fill="#999" text-anchor="middle">教师照片</text></svg>')}`;

        console.log('Logo占位:', logoPlaceholder);
        console.log('校园占位:', campusPlaceholder);
        console.log('教师占位:', teacherPlaceholder);
    </script>
</body>
</html>
